# goreleaser configuration for auto-command.
#
# Local build check:  goreleaser release --snapshot --clean
# Real release:        git tag vX.Y.Z && git push --tags && goreleaser release --clean
version: 2

before:
  hooks:
    # download-only so the release build never mutates the tree (a dirty tree
    # would fail `goreleaser release`); run `go mod tidy` yourself before tagging.
    - go mod download

builds:
  - id: acmd
    main: ./cmd/acmd
    binary: acmd
    # Statically linked so the binary runs on any macOS/Linux host.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: acmd
    ids:
      - acmd
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - shell/auto-command.zsh

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  draft: false
